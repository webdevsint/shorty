<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>url-shortener</title>
  </head>
  <body>
    <div class="header">
      <h1>shorty,</h1>
      <p>the <a href="#">open-source</a> url shortener</p>
    </div>

    <hr style="margin: 0 2rem; background: #1585ea" />

    <form action="/shorten" method="post">
      <div class="form">
        <input
          type="text"
          name="url"
          class="url"
          placeholder="enter url here"
          required
        />
        <button type="submit">shorten</button> <br />
      </div>
    </form>

    <div class="container">
      <p>recent shorts:</p>
      <div>
        <ul class="shorts-list"></ul>
      </div>
    </div>

    <div class="footer">
      <center>
        <p>
          developed by
          <a href="https://instagram.com/nehan_yaser/">nehan yaser</a>
        </p>
      </center>
    </div>

    <script src="index.js" defer></script>
  </body>
</html>
